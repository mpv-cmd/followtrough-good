<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FollowThrough Dashboard</title>

  <style>
    body{
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
      background:#f4f6f8;
      margin:0;
      padding:24px;
      color:#111827;
    }

    h1{
      margin:0 0 8px 0;
      font-size:30px;
    }

    .sub{
      color:#6b7280;
      margin-bottom:24px;
    }

    .topbar{
      display:flex;
      gap:12px;
      align-items:center;
      flex-wrap:wrap;
      margin-bottom:20px;
    }

    input, button{
      padding:10px 12px;
      border-radius:8px;
      border:1px solid #d1d5db;
      font-size:14px;
    }

    input{
      background:white;
    }

    button{
      background:#111827;
      color:white;
      border:none;
      cursor:pointer;
    }

    button:hover{
      background:#1f2937;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(340px,1fr));
      gap:18px;
    }

    .card{
      background:white;
      padding:18px;
      border-radius:12px;
      box-shadow:0 4px 12px rgba(0,0,0,.08);
    }

    .card h3{
      margin-top:0;
      margin-bottom:14px;
      font-size:18px;
    }

    .muted{
      color:#6b7280;
      font-size:14px;
    }

    .list{
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .item{
      padding:10px 12px;
      background:#f9fafb;
      border-radius:8px;
      border:1px solid #e5e7eb;
      line-height:1.4;
    }

    .pill{
      display:inline-block;
      padding:4px 8px;
      border-radius:999px;
      font-size:12px;
      background:#eef2ff;
      color:#3730a3;
      margin-top:6px;
      margin-right:6px;
    }

    .pill.urgent{
      background:#fee2e2;
      color:#991b1b;
    }

    .pill.owner{
      background:#dcfce7;
      color:#166534;
    }

    .pill.confidence{
      background:#f3f4f6;
      color:#374151;
    }

    pre{
      white-space:pre-wrap;
      word-break:break-word;
      font-size:13px;
      background:#fafafa;
      padding:12px;
      border-radius:8px;
      overflow:auto;
      border:1px solid #e5e7eb;
      max-height:420px;
    }

    .empty{
      color:#9ca3af;
      font-style:italic;
    }

    .summary-box{
      line-height:1.55;
      background:#f9fafb;
      border:1px solid #e5e7eb;
      border-radius:8px;
      padding:12px;
    }

    .two-col{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }

    .metric-row{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:10px;
    }

    .metric{
      background:#f9fafb;
      border:1px solid #e5e7eb;
      border-radius:10px;
      padding:10px 12px;
      min-width:120px;
    }

    .metric .label{
      font-size:12px;
      color:#6b7280;
      margin-bottom:4px;
    }

    .metric .value{
      font-size:20px;
      font-weight:700;
    }

    .section-title{
      font-size:13px;
      color:#6b7280;
      margin-bottom:8px;
      margin-top:14px;
      text-transform:uppercase;
      letter-spacing:.04em;
    }

    @media (max-width: 700px){
      .two-col{
        grid-template-columns:1fr;
      }
    }
  </style>
</head>
<body>

  <h1>FollowThrough Dashboard</h1>
  <div class="sub">Live meeting intelligence from your latest uploaded meeting.</div>

  <div class="topbar">
    <input id="workspace" value="default" placeholder="Workspace" />
    <button onclick="loadDashboard()">Refresh</button>
  </div>

  <div class="card" id="priorityCard">
    <h3>What matters now</h3>
    <div id="priority" class="empty">Loading...</div>
  </div>

  <div style="height:18px;"></div>

  <div class="grid">
    <div class="card">
      <h3>Latest Upload</h3>
      <div id="latestUpload" class="muted">Loading...</div>
    </div>

    <div class="card">
      <h3>Summary</h3>
      <div id="summary" class="empty">Loading...</div>
    </div>

    <div class="card">
      <h3>Actions</h3>
      <div id="actions" class="empty">Loading...</div>
    </div>

    <div class="card">
      <h3>Insights</h3>
      <div id="insights" class="empty">Loading...</div>
    </div>

    <div class="card">
      <h3>Meeting Timeline</h3>
      <div id="timeline" class="empty">Loading...</div>
    </div>

    <div class="card">
      <h3>Transcript</h3>
      <pre id="transcript">Loading...</pre>
    </div>

    <div class="card">
      <h3>Raw JSON</h3>
      <pre id="rawJson">Loading...</pre>
    </div>
  </div>

  <script>
    const API = "https://followtrough-good-production.up.railway.app";

    function workspaceValue() {
      return encodeURIComponent(document.getElementById("workspace").value.trim() || "default");
    }

    async function fetchJson(endpoint) {
      const res = await fetch(`${API}${endpoint}`);
      if (!res.ok) {
        throw new Error(`HTTP ${res.status}`);
      }
      return await res.json();
    }

    function safeText(value, fallback = "Unknown") {
      const text = value == null ? "" : String(value).trim();
      return text || fallback;
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function normalizeDeadline(deadline) {
      if (!deadline) return "";
      if (deadline === "tomorrow") return "Tomorrow";
      if (deadline === "+7 days") return "Next week";
      return String(deadline);
    }

    function isUrgentAction(action) {
      return Boolean(action && action.deadline);
    }

    function sortActions(actions) {
      return [...actions].sort((a, b) => {
        const aUrgent = isUrgentAction(a) ? 1 : 0;
        const bUrgent = isUrgentAction(b) ? 1 : 0;
        if (aUrgent !== bUrgent) return bUrgent - aUrgent;

        const aOwner = a?.owner ? 1 : 0;
        const bOwner = b?.owner ? 1 : 0;
        if (aOwner !== bOwner) return bOwner - aOwner;

        return 0;
      });
    }

    function parseSummaryJson(summaryJson) {
      if (!summaryJson) return null;
      try {
        return JSON.parse(summaryJson);
      } catch {
        return null;
      }
    }

    function renderLatestUpload(data) {
      const el = document.getElementById("latestUpload");

      if (!data || !data.latest_upload) {
        el.innerHTML = `<div class="empty">No uploads yet.</div>`;
        return;
      }

      const upload = data.latest_upload;

      el.innerHTML = `
        <div><strong>Filename:</strong> ${escapeHtml(safeText(upload.filename))}</div>
        <div><strong>Status:</strong> ${escapeHtml(safeText(upload.status))}</div>
        <div><strong>Created:</strong> ${escapeHtml(safeText(upload.created_at))}</div>
        <div><strong>Upload ID:</strong> ${escapeHtml(safeText(upload.id))}</div>
      `;
    }

    function renderPriority(data) {
      const el = document.getElementById("priority");
      const actions = sortActions(data?.actions || []);
      const urgent = actions.filter(action => isUrgentAction(action));

      if (!urgent.length) {
        el.innerHTML = `<div class="empty">No urgent actions right now.</div>`;
        return;
      }

      el.innerHTML = urgent.map(action => `
        <div class="item" style="margin-bottom:10px;">
          <div><strong>${escapeHtml(action.action || "Untitled action")}</strong></div>
          ${action.owner ? `<span class="pill owner">Owner: ${escapeHtml(action.owner)}</span>` : ""}
          ${action.deadline ? `<span class="pill urgent">Deadline: ${escapeHtml(normalizeDeadline(action.deadline))}</span>` : ""}
        </div>
      `).join("");
    }

    function renderSummary(data) {
      const el = document.getElementById("summary");
      const upload = data?.latest_upload;

      if (!upload || !upload.summary_json) {
        el.innerHTML = `<div class="empty">No summary available yet.</div>`;
        return;
      }

      const summaryObj = parseSummaryJson(upload.summary_json);

      if (!summaryObj) {
        el.innerHTML = `<div class="summary-box">${escapeHtml(upload.summary_json)}</div>`;
        return;
      }

      const decisions = (summaryObj.decisions || [])
        .map(x => `<div class="item">${escapeHtml(x)}</div>`)
        .join("");

      const keyPoints = (summaryObj.key_points || [])
        .map(x => `<div class="item">${escapeHtml(x)}</div>`)
        .join("");

      const risks = (summaryObj.risks || [])
        .map(x => `<div class="item">${escapeHtml(x)}</div>`)
        .join("");

      const nextSteps = (summaryObj.next_steps || [])
        .map(x => `<div class="item">${escapeHtml(x)}</div>`)
        .join("");

      el.innerHTML = `
        <div class="summary-box">
          <strong>${escapeHtml(summaryObj.title || "Meeting Summary")}</strong>
          <div style="margin-top:8px;">${escapeHtml(summaryObj.summary || "No summary text.")}</div>
        </div>

        <div class="two-col" style="margin-top:12px;">
          <div>
            <div class="section-title">Decisions</div>
            <div class="list">${decisions || `<div class="empty">None</div>`}</div>
          </div>
          <div>
            <div class="section-title">Risks</div>
            <div class="list">${risks || `<div class="empty">None</div>`}</div>
          </div>
        </div>

        <div style="margin-top:12px;">
          <div class="section-title">Key Points</div>
          <div class="list">${keyPoints || `<div class="empty">None</div>`}</div>
        </div>

        <div style="margin-top:12px;">
          <div class="section-title">Next Steps</div>
          <div class="list">${nextSteps || `<div class="empty">None</div>`}</div>
        </div>
      `;
    }

    function renderActions(data) {
      const el = document.getElementById("actions");
      const actions = sortActions(data?.actions || []);

      if (!actions.length) {
        el.innerHTML = `<div class="empty">No actions found.</div>`;
        return;
      }

      el.innerHTML = actions.map(action => `
        <div class="item">
          <div><strong>→ ${escapeHtml(action.action || "Untitled action")}</strong></div>
          ${action.owner ? `<span class="pill owner">Owner: ${escapeHtml(action.owner)}</span>` : ""}
          ${action.deadline ? `<span class="pill urgent">Deadline: ${escapeHtml(normalizeDeadline(action.deadline))}</span>` : ""}
          ${action.confidence != null ? `<span class="pill confidence">Confidence: ${Math.round(Number(action.confidence) * 100)}%</span>` : ""}
        </div>
      `).join("");
    }

    function renderInsights(data) {
      const el = document.getElementById("insights");
      const insights = data?.insights;

      if (!insights) {
        el.innerHTML = `<div class="empty">No insights available.</div>`;
        return;
      }

      const topTopics = (insights.summary?.top_topics || [])
        .map(topic => `<span class="pill">${escapeHtml(topic)}</span>`)
        .join("");

      const people = (insights.people || [])
        .slice(0, 10)
        .map(name => `<span class="pill">${escapeHtml(name)}</span>`)
        .join("");

      el.innerHTML = `
        <div class="metric-row">
          <div class="metric">
            <div class="label">People</div>
            <div class="value">${insights.summary?.people_count ?? 0}</div>
          </div>
          <div class="metric">
            <div class="label">Tasks</div>
            <div class="value">${insights.summary?.task_count ?? 0}</div>
          </div>
          <div class="metric">
            <div class="label">Decisions</div>
            <div class="value">${insights.summary?.decision_count ?? 0}</div>
          </div>
        </div>

        <div style="margin-top:12px;">
          <div class="section-title">Top Topics</div>
          <div>${topTopics || `<span class="empty">None</span>`}</div>
        </div>

        <div style="margin-top:12px;">
          <div class="section-title">People Mentioned</div>
          <div>${people || `<span class="empty">None</span>`}</div>
        </div>
      `;
    }

    function renderTimeline(data) {
      const el = document.getElementById("timeline");
      const timeline = data?.timeline || [];

      if (!timeline.length) {
        el.innerHTML = `<div class="empty">No meetings in timeline yet.</div>`;
        return;
      }

      el.innerHTML = timeline.map(item => `
        <div class="item">
          <div><strong>${escapeHtml(item.title || "Meeting")}</strong></div>
          <div class="muted" style="margin-top:6px;">Actions: ${(item.actions || []).length}</div>
        </div>
      `).join("");
    }

    function renderTranscript(data) {
      const el = document.getElementById("transcript");
      const transcript = data?.latest_upload?.transcript;
      el.textContent = transcript || "No transcript available yet.";
    }

    function renderRawJson(data) {
      const el = document.getElementById("rawJson");
      el.textContent = JSON.stringify(data, null, 2);
    }

    async function loadDashboard() {
      const ws = workspaceValue();

      try {
        const dashboard = await fetchJson(`/dashboard?workspace=${ws}`);
        renderLatestUpload(dashboard);
        renderPriority(dashboard);
        renderSummary(dashboard);
        renderActions(dashboard);
        renderTranscript(dashboard);
        renderRawJson(dashboard);
      } catch (err) {
        document.getElementById("latestUpload").innerHTML = `<div class="empty">Failed loading dashboard.</div>`;
        document.getElementById("priority").innerHTML = `<div class="empty">Failed loading priorities.</div>`;
        document.getElementById("summary").innerHTML = `<div class="empty">Failed loading summary.</div>`;
        document.getElementById("actions").innerHTML = `<div class="empty">Failed loading actions.</div>`;
        document.getElementById("transcript").textContent = "Failed loading transcript.";
        document.getElementById("rawJson").textContent = "Failed loading raw JSON.";
      }

      try {
        const insights = await fetchJson(`/insights?workspace=${ws}`);
        renderInsights(insights);
      } catch (err) {
        document.getElementById("insights").innerHTML = `<div class="empty">Failed loading insights.</div>`;
      }

      try {
        const timeline = await fetchJson(`/timeline?workspace=${ws}`);
        renderTimeline(timeline);
      } catch (err) {
        document.getElementById("timeline").innerHTML = `<div class="empty">Failed loading timeline.</div>`;
      }
    }

    loadDashboard();
  </script>
</body>
</html>
