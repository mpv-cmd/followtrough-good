<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<title>FollowThrough тАУ Approvals</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>

<style>
body{
  font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto;
  margin:30px;
  background:#f7f7f7;
}

button{
  padding:6px 12px;
  cursor:pointer;
}

.card{
  border:1px solid #ddd;
  background:white;
  padding:12px;
  margin-top:10px;
  border-radius:6px;
}

.review{
  background:#fafafa;
}

.small{
  font-size:12px;
  opacity:.7;
}

.badge{
  margin-left:8px;
  font-size:12px;
}

</style>
</head>

<body>

<h2>FollowThrough тАУ Approve Actions</h2>

<div style="display:flex;gap:10px;flex-wrap:wrap">

<button id="loadBtn" onclick="loadLatest()">Load latest</button>

<a href="http://127.0.0.1:8000/auth/google?mode=redirect" target="_blank">
Connect Google Calendar
</a>

<input
id="filter"
placeholder="Filter actions..."
style="padding:6px;min-width:240px"
oninput="renderFiltered()"
/>

<button id="selAllBtn" onclick="selectAll(true)" disabled>Select all</button>
<button id="selNoneBtn" onclick="selectAll(false)" disabled>Select none</button>

</div>

<pre id="debug" style="margin-top:10px"></pre>

<div id="actionsPanel" style="display:none">

<div style="margin-top:12px">
<button onclick="approveSelected()">тЬЕ Add selected</button>
<button onclick="approveAll()">ЁЯЪА Add all</button>
<span id="count" class="small"></span>
</div>

<div id="actions"></div>

</div>

<script>

const API = window.location.origin.includes("127")
  ? "http://127.0.0.1:8000"
  : window.location.origin;

let actionsCache=[]
let approvedKeys=new Set()

function busy(state,msg){

["loadBtn","selAllBtn","selNoneBtn"].forEach(id=>{
let el=document.getElementById(id)
if(el)el.disabled=state
})

if(msg)document.getElementById("debug").innerText=msg
}

function selectedIndices(){

return Array.from(document.querySelectorAll('[id^="actPick"]'))
.filter(x=>x.checked)
.map(x=>parseInt(x.value))
}

function selectAll(v){

document.querySelectorAll('[id^="actPick"]').forEach(x=>{
x.checked=v
})

updateCount()
}

function updateCount(){

let total=actionsCache.length
let sel=selectedIndices().length

document.getElementById("count").innerText=`${sel}/${total} selected`
}

function dedupeKey(index){

let a=actionsCache[index]
let title=(a.action||"").trim()

let d=document.getElementById(`actDate${index}`)?.value||a.deadline||""

return `${d}|${title}`
}

function markStatus(index,type,msg){

let badge=document.getElementById(`status${index}`)
if(!badge)return

if(type==="created"){
badge.innerText="тЬЕ Created"
badge.style.color="green"
}

if(type==="duplicate"){
badge.innerText="ЁЯЯб Duplicate"
badge.style.color="orange"
}

if(type==="failed"){
badge.innerText="тЭМ Failed "+msg
badge.style.color="red"
}

updateCount()
}

function renderFiltered(){

let q=document.getElementById("filter").value.toLowerCase()

let container=document.getElementById("actions")
container.innerHTML=""

actionsCache.forEach((a,i)=>{

if(q && !a.action.toLowerCase().includes(q))return

let conf=a.confidence||0.5
let needsReview=conf<0.7

let deadline=a.deadline||""

let approved=approvedKeys.has(`${deadline}|${a.action.trim()}`)

container.innerHTML+=`

<div class="card ${needsReview?"review":""}" id="card${i}">

<label>
<input type="checkbox" id="actPick${i}" value="${i}" ${approved?"disabled":""} onchange="updateCount()">
<b>${a.action}</b>

<span id="status${i}" class="badge">
${approved?"ЁЯЯб Duplicate":""}
</span>

<span class="small">Confidence ${Math.round(conf*100)}%</span>
</label>

<div style="margin-top:6px">

Deadline:
<input type="date" id="actDate${i}" value="${deadline}" ${approved?"disabled":""}>

</div>

<div class="small">Owner: ${a.owner||"тАФ"}</div>
<div class="small">Source: ${a.source_sentence||"тАФ"}</div>

</div>
`
})

updateCount()
}

async function loadLatest(){

busy(true,"Loading latest actions...")

let res=await fetch(`${API}/latest`)
let data=await res.json()

document.getElementById("debug").innerText=JSON.stringify(data,null,2)

if(data.status!=="ok"){
busy(false)
alert("No meeting uploaded yet")
return
}

actionsCache=data.data.actions||[]
approvedKeys=new Set(data.data.approved_keys||[])

if(!actionsCache.length){
alert("No actions detected")
busy(false)
return
}

document.getElementById("actionsPanel").style.display="block"

document.getElementById("selAllBtn").disabled=false
document.getElementById("selNoneBtn").disabled=false

renderFiltered()

busy(false)
}

async function approveSelected(){

let indices=selectedIndices()

if(!indices.length){
alert("Select at least one action")
return
}

let deadlines={}

indices.forEach(i=>{
let d=document.getElementById(`actDate${i}`).value
if(d)deadlines[String(i)]=d
})

busy(true,"Creating events...")

let res=await fetch(`${API}/approve_bulk`,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({indices,deadlines})
})

let data=await res.json()

document.getElementById("debug").innerText=JSON.stringify(data,null,2)

if(data.status==="bulk_done"){

data.created.forEach(x=>{
approvedKeys.add(dedupeKey(x.index))
markStatus(x.index,"created")
})

data.failed.forEach(x=>{
if(x.error.includes("Duplicate"))
markStatus(x.index,"duplicate")
else
markStatus(x.index,"failed",x.error)
})

}

busy(false)

alert(`Created ${data.created.length} events`)
}

function approveAll(){

selectAll(true)
approveSelected()

}

</script>

</body>
</html>
