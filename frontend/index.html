<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FollowThrough AI</title>

<style>
:root{
--bg:#f6f8fb;
--card:#ffffff;
--text:#111827;
--muted:#6b7280;
--line:#d1d5db;
--sidebar:#111827;
--sidebar-2:#1f2937;
--accent:#2563eb;
--success:#166534;
--success-bg:#dcfce7;
--warn:#92400e;
--warn-bg:#fef3c7;
--danger:#991b1b;
--danger-bg:#fee2e2;
--pill:#eef2ff;
--pill-text:#3730a3;
--shadow:0 4px 12px rgba(0,0,0,.08);
}

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
background:var(--bg);
display:flex;
}

.sidebar{
width:240px;
background:var(--sidebar);
color:white;
padding:20px;
}

.nav-btn{
display:block;
width:100%;
margin-top:10px;
padding:10px;
border:none;
background:var(--sidebar-2);
color:white;
border-radius:8px;
cursor:pointer;
text-align:left;
}

.main{
flex:1;
padding:25px;
}

.card{
background:white;
padding:18px;
border-radius:10px;
box-shadow:var(--shadow);
margin-bottom:20px;
}

.btn{
padding:10px 14px;
border:none;
border-radius:8px;
background:var(--sidebar);
color:white;
cursor:pointer;
}

.status{
margin-top:10px;
padding:10px;
border-radius:8px;
background:#eee;
}

.item{
padding:10px;
border:1px solid #ddd;
border-radius:6px;
margin-bottom:10px;
}

</style>
</head>

<body>

<div class="sidebar">
<h2>FollowThrough</h2>

<button class="nav-btn" onclick="showHome()">Home</button>
<button class="nav-btn" onclick="showUpload()">Upload</button>
<button class="nav-btn" onclick="showApprovals()">Approve Actions</button>
<button class="nav-btn" onclick="showCopilot()">Copilot</button>
<button class="nav-btn" onclick="showDashboard()">Dashboard</button>
</div>

<div class="main" id="main"></div>

<script>

const API = "https://followtrough-good-production.up.railway.app";

function render(html){
document.getElementById("main").innerHTML = html;
}

function showHome(){
render(`
<h1>FollowThrough AI</h1>
<p>Upload → Extract → Approve → Execute</p>
`);
}

/* ================= UPLOAD ================= */

function showUpload(){
render(`
<div class="card">
<h3>Upload Meeting</h3>

<input type="file" id="file">

<br><br>

<button class="btn" onclick="upload()">Upload</button>

<div id="status" class="status"></div>
</div>

<div class="card">
<h3>Result</h3>
<div id="result"></div>
</div>
`);
}

async function upload(){

const file = document.getElementById("file").files[0];

const form = new FormData();
form.append("file", file);

document.getElementById("status").innerText = "Uploading...";

const res = await fetch(`${API}/meetings/upload?workspace=default`,{
method:"POST",
body:form
});

const data = await res.json();

poll(data.upload_id);
}

function poll(id){

const interval = setInterval(async()=>{

const res = await fetch(`${API}/meetings/status/${id}?workspace=default`);
const data = await res.json();

document.getElementById("status").innerText = data.status;

if(data.status==="completed"){
clearInterval(interval);
renderResult(data);
}

},2000);
}

function renderResult(data){

const actions = data.data.actions || [];

document.getElementById("result").innerHTML = `
<h4>Actions</h4>
${actions.map(a=>`
<div class="item">
<strong>${a.action}</strong><br>
${a.owner||""} ${a.deadline||""}
</div>
`).join("")}

<br>
<button class="btn" onclick="showApprovals()">Review Actions</button>
`;
}

/* ================= APPROVAL ================= */

function showApprovals(){
render(`
<div class="card">
<h3>Approve Actions</h3>

<button class="btn" onclick="loadApprovals()">Load Actions</button>
<button class="btn" onclick="approve()">Approve Selected</button>

<div id="approvalStatus" class="status"></div>
</div>

<div class="card">
<div id="actions"></div>
</div>

<div class="card">
<pre id="resultBox"></pre>
</div>
`);
}

async function loadApprovals(){

const res = await fetch(`${API}/approve/latest?workspace=default`);
const data = await res.json();

window.upload_id = data.upload_id;

document.getElementById("actions").innerHTML =
data.actions.map(a=>`
<div class="item">
<input type="checkbox" data-i="${a.index}">
<strong>${a.action}</strong>
</div>
`).join("");

document.getElementById("approvalStatus").innerText="Loaded";
}

async function approve(){

const boxes = [...document.querySelectorAll("input[type=checkbox]:checked")];

const selected = boxes.map(b=>({ index:Number(b.dataset.i) }));

const res = await fetch(`${API}/approve/bulk?workspace=default`,{
method:"POST",
headers:{ "Content-Type":"application/json" },
body: JSON.stringify({
upload_id: window.upload_id,
selected
})
});

const data = await res.json();

document.getElementById("resultBox").innerText =
JSON.stringify(data,null,2);
}

/* ================= COPILOT ================= */

function showCopilot(){
render(`
<div class="card">
<h3>Ask</h3>

<textarea id="q"></textarea><br><br>
<button class="btn" onclick="ask()">Ask</button>
</div>

<div class="card">
<pre id="out"></pre>
</div>
`);
}

async function ask(){

const q = document.getElementById("q").value;

const res = await fetch(`${API}/copilot?workspace=default`,{
method:"POST",
headers:{ "Content-Type":"application/json" },
body: JSON.stringify({ question:q })
});

const data = await res.json();

document.getElementById("out").innerText = data.answer;
}

/* ================= DASHBOARD ================= */

function showDashboard(){
window.open(`${API}/dashboard?workspace=default`);
}

showHome();

</script>
</body>
</html>
